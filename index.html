<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Brawn Welcome</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#020b1f;
font-family:'Poppins',sans-serif;
overflow:hidden;
color:white;
}

/* star sky */

body:before{
content:'';
position:absolute;
width:100%;
height:100%;
background-image:radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
opacity:0.25;
}

/* diwali lights */

.lights{
position:absolute;
top:0;
width:100%;
display:flex;
justify-content:space-around;
z-index:2;
}

.bulb{
width:10px;
height:15px;
border-radius:50%;
background:red;
box-shadow:0 0 10px red;
animation:blink 1.5s infinite alternate;
}

.bulb:nth-child(2){background:yellow;box-shadow:0 0 10px yellow}
.bulb:nth-child(3){background:lime;box-shadow:0 0 10px lime}
.bulb:nth-child(4){background:cyan;box-shadow:0 0 10px cyan}
.bulb:nth-child(5){background:orange;box-shadow:0 0 10px orange}
.bulb:nth-child(6){background:pink;box-shadow:0 0 10px pink}

@keyframes blink{
0%{opacity:.5}
100%{opacity:1}
}

/* content */

.container{
text-align:center;
z-index:5;
max-width:900px;
}

/* congratulations */

.congrats{
font-size:48px;
color:#ffd700;
font-weight:bold;
margin-bottom:25px;
text-shadow:0 0 15px rgba(255,215,0,0.9);
}

/* company name */

.company{
font-size:36px;
color:#4da6ff;
font-style:italic;
font-weight:bold;
margin-top:60px;
line-height:1.3;
}

.tag{
color:red;
font-style:italic;
margin-bottom:20px;
}

.blue{
color:#4da6ff;
font-style:italic;
font-weight:bold;
}

p{
font-size:18px;
line-height:1.6;
}

/* fireworks */

canvas{
position:absolute;
top:0;
left:0;
z-index:1;
}

</style>
</head>

<body>

<div class="lights">
<div class="bulb"></div>
<div class="bulb"></div>
<div class="bulb"></div>
<div class="bulb"></div>
<div class="bulb"></div>
<div class="bulb"></div>
<div class="bulb"></div>
</div>

<canvas id="fireworks"></canvas>

<div class="container">

<div class="congrats">🎉 Congratulations 🎉</div>

<div class="company">
Brawn<br>
Group of Companies
</div>

<div class="tag">for better life..</div>

<h2>Welcome to the <span class="blue">Brawn Family</span></h2>

<p>
Greetings from <span class="blue">Brawn Group of Companies</span>.
Your form has been successfully submitted.
</p>

<p>
We are delighted to welcome you to the <span class="blue">Brawn Family</span>.
</p>

<p>
Warm regards,<br>
Human Resources Department<br>
<span class="blue">Brawn Group of Companies</span>
</p>

</div>

<script>

/* fireworks */

const canvas=document.getElementById("fireworks")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

function firework(){

let x=Math.random()*canvas.width
let y=Math.random()*canvas.height/2

for(let i=0;i<100;i++){

particles.push({
x:x,
y:y,
angle:Math.random()*2*Math.PI,
speed:Math.random()*5+2,
life:100
})

}

}

function animate(){

requestAnimationFrame(animate)

ctx.fillStyle="rgba(0,0,0,0.2)"
ctx.fillRect(0,0,canvas.width,canvas.height)

particles.forEach((p,i)=>{

p.x+=Math.cos(p.angle)*p.speed
p.y+=Math.sin(p.angle)*p.speed
p.life--

ctx.beginPath()
ctx.arc(p.x,p.y,2,0,Math.PI*2)
ctx.fillStyle="hsl("+Math.random()*360+",100%,60%)"
ctx.fill()

if(p.life<=0)particles.splice(i,1)

})

}

setInterval(firework,900)

animate()

/* confetti */

setInterval(()=>{
confetti({
particleCount:100,
spread:100,
origin:{y:0.6}
})
},2500)

</script>

</body>
</html>
